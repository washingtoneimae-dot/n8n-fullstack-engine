services:
  # ── n8n with custom nodes ──────────────────────────────
  n8n-dev:
    image: n8nio/n8n:latest
    container_name: n8n-fullstack-n8n
    ports:
      - "5678:5678"
    volumes:
      - ./packages/nodes:/home/node/.n8n/custom
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_CUSTOM_EXTENSIONS=/home/node/.n8n/custom
      - DB_TYPE=sqlite
      - DB_SQLITE_DATABASE=/home/node/.n8n/database.sqlite
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=http://localhost:5678
    restart: unless-stopped

  # ── App Runtime (Phase 2) ──────────────────────────────
  runtime-dev:
    build:
      context: ./packages/runtime
      dockerfile: ../../docker/runtime/Dockerfile
    container_name: n8n-fullstack-runtime
    ports:
      - "3000:3000"
    volumes:
      - ./packages/runtime/src:/app/src
      - ./packages/runtime/routes.json:/app/routes.json
      - ./packages/runtime/public:/app/public
    depends_on:
      - n8n-dev
    environment:
      - N8N_URL=http://n8n-dev:5678
      - PORT=3000
      - NODE_ENV=development
      - ROUTES_FILE=/app/routes.json
      - PUBLIC_DIR=/app/public

volumes:
  n8n_data:
